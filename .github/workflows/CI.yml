# конфигурационный файл для сборки проекта

name: Test # имя workflow-а

on: # прописываем триггеры для нашего workflow - a
  pull_request:
    paths:
      - '**.kt'
      - '**.yml'
  push:
    paths:
      - '**.kt'
      - '**.yml'

jobs: 
  test:
    if: github.actor!= 'github-classroom[bot]'

    runs-on: ubuntu-latest # выбрали окружение
    steps: 				   
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: zulu
      - name: Build 
        run: ./gradlew build -x test # прогоняем только сборку без запуска автотестов
      - name: Test
        run: ./gradlew test 
